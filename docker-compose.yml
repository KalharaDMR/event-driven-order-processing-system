services:

  rabbitmq:
    image: rabbitmq:3-management

    ports:
      - "5672:5672"
      - "15672:15672"

  order-service:
    build:
      context: ./order-service

    ports:
      - "3000:3000"

    depends_on:
      - rabbitmq

  inventory-service:
    build:
      context: ./inventory-service

    depends_on:
      - rabbitmq

  notification-service:
    build:
      context: ./notification-service

    depends_on:
      - rabbitmq