name: Docker Publish

on:
  push:
    branches:
      - main

jobs:

  publish:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Order Service
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest \
            ./order-service

      - name: Push Order Service
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/order-service:latest

      - name: Build Inventory Service
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/inventory-service:latest \
            ./inventory-service

      - name: Push Inventory Service
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/inventory-service:latest

      - name: Build Notification Service
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/notification-service:latest \
            ./notification-service

      - name: Push Notification Service
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/notification-service:latest